<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Yonah House · Text-only Curated Goods</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0912;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 110, 100, 0.06) 0%, transparent 45%),
                              radial-gradient(circle at 90% 70%, rgba(210, 120, 180, 0.04) 0%, transparent 50%);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Poppins', 'Roboto', sans-serif;
            color: #ececf4;
            line-height: 1.45;
            min-height: 100vh;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 1.8rem 4rem;
            position: relative;
            z-index: 2;
        }

        /* header */
        .hero {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,245,225,0.1);
        }
        .hero h1 {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(120deg, #fef0da, #ffb288, #ff8a7a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.3rem;
        }
        .hero .sub {
            font-size: 0.95rem;
            color: #aaa6c7;
            font-weight: 400;
        }

        /* search */
        .search-section {
            max-width: 560px;
            margin: 0 auto 1.8rem auto;
        }
        .search-box {
            display: flex;
            gap: 0.6rem;
            background: #14111e;
            border-radius: 48px;
            padding: 0.2rem 0.2rem 0.2rem 1.4rem;
            border: 1px solid #2f2a40;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .search-box:focus-within {
            border-color: #ff8a7a;
            box-shadow: 0 0 0 2px rgba(255, 110, 100, 0.3);
        }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.75rem 0;
            font-size: 0.95rem;
            color: #f2f0ff;
            outline: none;
            font-family: inherit;
        }
        .search-box input::placeholder {
            color: #5e5a7c;
        }
        .search-box button {
            background: #ff6f61;
            border: none;
            padding: 0 1.5rem;
            border-radius: 48px;
            color: white;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }
        .search-box button:hover {
            background: #ff5848;
            transform: scale(0.98);
        }
        .search-info {
            text-align: center;
            font-size: 0.75rem;
            color: #8b87aa;
            margin-top: 0.6rem;
            cursor: pointer;
            display: inline-block;
            background: rgba(255,245,235,0.05);
            padding: 0.2rem 0.9rem;
            border-radius: 30px;
            transition: all 0.2s;
        }
        .search-info:hover {
            color: #ffb68b;
            background: rgba(255,111,97,0.12);
        }

        /* categories */
        .category-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.7rem;
            margin-bottom: 2.2rem;
        }
        .cat-btn {
            background: #14111e;
            border: 1px solid #2d283e;
            padding: 0.5rem 1.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
            color: #cdcae6;
        }
        .cat-btn:hover {
            background: #211d2f;
            border-color: #ff8a7a;
            color: white;
        }
        .cat-btn.active {
            background: #ff6f61;
            border-color: #ff6f61;
            color: white;
            box-shadow: 0 4px 12px rgba(255, 111, 97, 0.3);
        }

        /* text-only product cards — no images, pure typography */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.6rem;
        }

        .product-card {
            background: rgba(18, 15, 28, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 1.4rem 1.5rem 1.6rem;
            border: 1px solid rgba(255,245,230,0.08);
            transition: all 0.25s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            background: #1f1b2e;
            border-color: rgba(255, 111, 97, 0.5);
            transform: translateY(-4px);
            box-shadow: 0 20px 28px -10px rgba(0,0,0,0.6);
        }

        .text-badge {
            display: inline-block;
            background: rgba(255,111,97,0.12);
            padding: 0.2rem 0.9rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            color: #ffbb99;
            margin-bottom: 1rem;
            width: fit-content;
            border: 0.5px solid rgba(255,111,97,0.3);
        }

        .product-name {
            font-size: 1.35rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 0.5rem;
            color: #fff3e6;
            letter-spacing: -0.2px;
        }
        .product-desc {
            font-size: 0.85rem;
            color: #bcb9d6;
            margin: 0.5rem 0 0.8rem;
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 0.6rem 0 0.2rem;
            flex-wrap: wrap;
            gap: 6px;
        }
        .price {
            font-size: 1.55rem;
            font-weight: 700;
            color: #ffae85;
            letter-spacing: -0.3px;
        }
        .unit {
            font-size: 0.7rem;
            color: #948fbb;
        }
        .category-tag {
            font-size: 0.7rem;
            background: #2c263d;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            color: #d9d4f0;
        }
        .info-hint {
            margin-top: 0.9rem;
            font-size: 0.7rem;
            color: #7e7aa0;
            border-top: 1px dashed rgba(255,245,200,0.12);
            padding-top: 0.7rem;
            display: flex;
            justify-content: flex-end;
        }

        /* floating action */
        .float-buttons {
            position: fixed;
            bottom: 28px;
            right: 28px;
            display: flex;
            gap: 14px;
            z-index: 1000;
        }
        .float-btn {
            width: 54px;
            height: 54px;
            border-radius: 30px;
            background: #1e192b;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,111,97,0.5);
            color: #ffd9c4;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            transition: 0.2s;
        }
        .float-btn:hover {
            background: #ff6f61;
            color: white;
            transform: scale(1.05);
            border-color: transparent;
        }

        /* detail modal — text first */
        .detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(6, 5, 14, 0.97);
            backdrop-filter: blur(20px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .detail-modal.show {
            display: flex;
        }
        .detail-content {
            background: #13101e;
            max-width: 860px;
            width: 90%;
            max-height: 85vh;
            border-radius: 36px;
            padding: 1.8rem 2rem;
            border: 1px solid rgba(255, 111, 97, 0.4);
            box-shadow: 0 30px 50px rgba(0,0,0,0.7);
            overflow-y: auto;
            position: relative;
        }
        .detail-close {
            position: absolute;
            top: 20px;
            right: 24px;
            background: rgba(255,245,235,0.08);
            border: none;
            color: #dfdbf5;
            font-size: 1.3rem;
            width: 38px;
            height: 38px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .detail-close:hover {
            background: #ff6f61;
            color: white;
            transform: rotate(90deg);
        }
        .detail-info h2 {
            font-size: 1.9rem;
            font-weight: 600;
            color: #fff2e8;
            margin-bottom: 0.5rem;
            padding-right: 30px;
        }
        .detail-price {
            font-size: 2rem;
            font-weight: 700;
            color: #ffb282;
            margin: 0.8rem 0;
        }
        .detail-desc {
            color: #cfcceb;
            line-height: 1.6;
            margin: 1rem 0;
        }
        .detail-spec {
            background: #0c0b16;
            border-radius: 24px;
            padding: 1rem 1.2rem;
            margin: 1rem 0;
            border-left: 3px solid #ff8a7a;
        }
        .detail-spec h4 {
            color: #ffbc9a;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .detail-spec p {
            color: #b5b0db;
            font-size: 0.9rem;
            white-space: pre-line;
        }
        .detail-buy-btn {
            background: #ff6f61;
            border: none;
            padding: 0.9rem 1.8rem;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 0.8rem;
        }
        .detail-buy-btn:hover {
            background: #ff5848;
            transform: translateY(-2px);
        }

        /* side panels */
        .side-panel {
            position: fixed;
            bottom: 100px;
            right: 24px;
            width: 300px;
            max-width: calc(100% - 48px);
            background: #15121e;
            backdrop-filter: blur(20px);
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255,111,97,0.4);
            z-index: 1001;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .side-panel.show {
            display: flex;
        }
        .panel-header {
            background: #1f1a2e;
            color: #ffe6d5;
            padding: 14px 18px;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,140,110,0.3);
        }
        .panel-body {
            padding: 24px 18px;
            text-align: center;
        }
        .qr-image {
            max-width: 180px;
            width: 100%;
            border-radius: 20px;
            margin: 12px auto;
            display: block;
            border: 1px solid #ffa07a;
            background: #fef2e6;
        }
        .qr-caption {
            font-size: 0.7rem;
            color: #c2bce4;
            margin-top: 12px;
        }
        .footer {
            margin-top: 3.5rem;
            text-align: center;
            font-size: 0.7rem;
            color: #605c82;
            border-top: 0.5px solid rgba(255,245,220,0.08);
            padding-top: 1.8rem;
        }

        @media (max-width: 650px) {
            .container { padding: 1.2rem 1rem 2rem; }
            .hero h1 { font-size: 2rem; }
            .product-name { font-size: 1.2rem; }
            .price { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>Yonah House · Text-only</h1>
        <div class="sub">curated goods · no images, pure essence</div>
    </div>

    <div class="search-section">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by name or description..." autocomplete="off">
            <button id="searchBtn">Find</button>
        </div>
        <div id="searchInfo" class="search-info">📋 All categories · 0 items</div>
    </div>

    <div class="category-bar">
        <button class="cat-btn" data-cat="home">🏠 Home</button>
        <button class="cat-btn" data-cat="accessories">🕶️ Accessories</button>
        <button class="cat-btn" data-cat="beauty">✨ Beauty</button>
        <button class="cat-btn" data-cat="lifestyle">🧘 Lifestyle</button>
        <button class="cat-btn" data-cat="all">🌿 All</button>
    </div>

    <div id="productGrid" class="product-grid"></div>
    <div class="footer">Text-first · Minimal · Yonah House</div>
</div>

<div class="float-buttons">
    <button class="float-btn" id="paymentCodeBtn">💳</button>
    <button class="float-btn" id="wechatFriendBtn">📞</button>
</div>

<div id="paymentPanel" class="side-panel">
    <div class="panel-header">
        <span>💳 Payment (Paypal)</span>
        <button class="close-panel" id="closePaymentBtn">✕</button>
    </div>
    <div class="panel-body">
        <img id="paymentQrImg" class="qr-image" src="https://picui.ogmua.cn/s1/2026/03/27/69c67a129085b.webp" alt="Payment QR" onerror="this.src='https://placehold.co/280x280/2a1e3a/ff8e53?text=PayPal+QR'">
        <div class="qr-caption">Scan to pay · contact owner</div>
    </div>
</div>

<div id="wechatPanel" class="side-panel">
    <div class="panel-header">
        <span>📱 Contact / WhatsApp</span>
        <button class="close-panel" id="closeWechatBtn">✕</button>
    </div>
    <div class="panel-body">
        <img id="wechatQrImg" class="qr-image" src="https://picui.ogmua.cn/s1/2026/03/27/69c67a128fb34.webp" alt="Contact QR" onerror="this.src='https://placehold.co/280x280/2a1e3a/ff8e53?text=Contact+QR'">
        <div class="qr-caption">Scan to connect with Yonah</div>
    </div>
</div>

<div id="detailModal" class="detail-modal">
    <div class="detail-content">
        <button class="detail-close" id="closeDetailBtn">✕</button>
        <div id="detailMain" class="detail-info"></div>
    </div>
</div>

<script>
    // english product data — text-only, no images used
    const products = [
        { id:1, name:"Seven Dragon Ball · Self-discipline Art Piece", desc:"Legendary collectible with radiant glow, inspires daily focus and motivation. Perfect for anime lovers.", price:15.99, unit:"pc", category:"lifestyle", 
          specs:"Limited edition · resin + metallic coating · Diameter 2.5 in · includes display stand." },
        { id:2, name:"pebblepaw Cat Plush Charm", desc:"Adorable grey & white tiger-striped cat plushie. Bag/key accessory, combines cuteness and companionship.", price:29.99, unit:"pc", category:"accessories", 
          specs:"Approx 5.1 inches · high-quality plush fabric." },
        { id:3, name:"Ultra Soft Bristles Toothbrush", desc:"High-grade soft bristle toothbrush, gentle on sensitive gums. Perfect for adults, couples, students.", price:12.99, unit:"pc", category:"lifestyle", 
          specs:"Ultra soft · sensitive gums · premium ergonomic handle." },
        { id:4, name:"Cyberpunk Lamborghini V12 Building Blocks", desc:"1:14 scale black-gold cyberpunk sports car model, V12 engine, suspension, lighting & remote control option.", price:29.99, unit:"set", category:"lifestyle", 
          specs:"Eco-friendly ABS blocks · dynamic version includes motor/battery · 35x16x9cm · age 14+" },
        { id:5, name:"Creative Stone Statue Tissue Holder", desc:"Luxury funny tissue box cover for living room, coffee table decor & quirky storage holder.", price:29.99, unit:"pc", category:"home", 
          specs:"Resin stone texture · as shown in pictures" },
        { id:6, name:"Healing Cactus Plush Cushion", desc:"Korean-style squatting cactus plush toy, cute embroidered expression, perfect sofa / bed decor.", price:24.99, unit:"pc", category:"lifestyle", 
          specs:"Approx 60cm · soft plush & button design" },
        { id:7, name:"Japanese Glacier Glass Cup", desc:"Aesthetic textured glass cup, ideal for juice, iced coffee, daily water. Ins style home essential.", price:9.9, unit:"pc", category:"home", 
          specs:"Glacier pattern · 350ml approx · dishwasher safe" },
        { id:8, name:"Crayon Shin-chan Absorbent Floor Mat", desc:"Cute cartoon bath mat, super absorbent, non-slip, easy to clean for bathroom & home.", price:15.99, unit:"pc", category:"home", 
          specs:"40x60cm · high-density material · anti-slip" },
        { id:9, name:"Ratatouille Plush Headband", desc:"Cute cartoon hair hoop, japanese/korean style, perfect for face washing or daily accessory.", price:9.99, unit:"pc", category:"accessories", 
          specs:"Soft plush, adjustable fit" },
        { id:10, name:"Tote Bag · Cute Cartoon Handbag", desc:"Large capacity, fashionable cartoon bag for women, daily commute & shoulder bag.", price:13.99, unit:"pc", category:"lifestyle", 
          specs:"20x27cm · durable canvas" },
        { id:11, name:"Aroma Diffuser · Golden Mountain Night Light", desc:"3D snow mountain design, essential oil diffuser + ambient night light, golden glow effect.", price:29.99, unit:"pc", category:"lifestyle", 
          specs:"10x10x10cm · natural stone · USB powered" },
        { id:12, name:"Cute Dog Keychain Hanger", desc:"Warm little white dog key holder, anti-lose doll key hanger, cute home accessory.", price:9.99, unit:"pc", category:"home", 
          specs:"8~10cm height · resin & plush details" },
        { id:13, name:"Van Gogh Starry Night · Hogwarts Wall Art", desc:"Magical blend of Starry Night brushstrokes and Hogwarts castle, warm gold tones, fade-resistant canvas.", price:69.99, unit:"pc", category:"home", 
          specs:"50x70cm · premium canvas print · ready to hang" },
        { id:14, name:"Mini Hair Clips · Funny Fish Set", desc:"Cute bikini-bottom style, ugly-cute fish mini clips for broken hair or bangs.", price:6.99, unit:"set", category:"accessories", 
          specs:"Set of 4 · durable resin" },
        { id:15, name:"Muscular God of Wealth Decor", desc:"Chinese style muscular wealth god key holder / desktop ornament, fortune attraction.", price:19.99, unit:"pc", category:"lifestyle", 
          specs:"Resin statue · as shown" },
        { id:16, name:"BIGCAR Ceramic Coated Tumbler 520ml", desc:"Insulated coffee tumbler with ceramic coating, leak-proof, includes tea strainer, floral patterns (Ginkgo/Lily/Rose).", price:19.99, unit:"pc", category:"lifestyle", 
          specs:"520ml · 304 stainless steel + ceramic inner · PP lid" },
        { id:17, name:"Small Transparent Fish Tank", desc:"Ice crystal desktop fish tank, creative ecology landscape kit, complete set.", price:18.99, unit:"pc", category:"lifestyle", 
          specs:"12x12x16cm · acrylic" }
    ];

    let currentCategory = "all";
    let currentSearchKeyword = "";

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, (m) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m));
    }

    function getFilteredProducts() {
        let filtered = [...products];
        if(currentSearchKeyword.trim() !== "") {
            const kw = currentSearchKeyword.trim().toLowerCase();
            filtered = filtered.filter(p => p.name.toLowerCase().includes(kw) || p.desc.toLowerCase().includes(kw));
        } else if(currentCategory !== "all") {
            filtered = filtered.filter(p => p.category === currentCategory);
        }
        return filtered;
    }

    function renderProductGrid() {
        const filtered = getFilteredProducts();
        const grid = document.getElementById("productGrid");
        const searchInfoDiv = document.getElementById("searchInfo");

        if(filtered.length === 0) {
            grid.innerHTML = `<div style="text-align:center; padding:50px 20px; color:#a6a2ca;">✨ No products matched ✨</div>`;
            searchInfoDiv.innerHTML = currentSearchKeyword ? `🔍 “${escapeHtml(currentSearchKeyword)}” · 0 items` : `✨ 0 items · click to reset`;
            return;
        }

        searchInfoDiv.innerHTML = currentSearchKeyword ? `🔍 “${escapeHtml(currentSearchKeyword)}”  ${filtered.length} items` : `📋 ${filtered.length} curated items · click to reset`;

        grid.innerHTML = filtered.map(product => `
            <div class="product-card" data-id="${product.id}">
                <div class="text-badge">✦ ${product.category}</div>
                <div class="product-name">${escapeHtml(product.name)}</div>
                <div class="product-desc">${escapeHtml(product.desc)}</div>
                <div class="meta-row">
                    <span class="price">$${product.price.toFixed(2)}</span>
                    <span class="unit">/ ${escapeHtml(product.unit)}</span>
                    <span class="category-tag">${escapeHtml(product.category)}</span>
                </div>
                <div class="info-hint">📖 tap for details →</div>
            </div>
        `).join('');

        document.querySelectorAll('.product-card').forEach(card => {
            card.addEventListener('click', () => {
                const pid = parseInt(card.dataset.id);
                const product = products.find(p => p.id === pid);
                if(product) showProductDetail(product);
            });
        });
    }

    function showProductDetail(product) {
        const modal = document.getElementById("detailModal");
        const detailMain = document.getElementById("detailMain");
        
        detailMain.innerHTML = `
            <h2>${escapeHtml(product.name)}</h2>
            <div class="detail-price">$${product.price.toFixed(2)} <span style="font-size:1rem;">/ ${product.unit}</span></div>
            <div class="detail-desc">${escapeHtml(product.desc)}</div>
            <div class="detail-spec">
                <h4>📦 Specifications</h4>
                <p>${escapeHtml(product.specs) || "Premium quality from Yonah House. Carefully sourced for your everyday joy."}</p>
            </div>
            <button class="detail-buy-btn" id="detailBuyBtn">✧ Purchase / Inquire ✧</button>
        `;
        modal.classList.add("show");
        
        setTimeout(() => {
            const buyBtn = document.getElementById('detailBuyBtn');
            if(buyBtn) buyBtn.onclick = () => {
                closeAllPanels();
                showPaymentPanel();
            };
        }, 30);
    }

    function performSearch() {
        const keyword = document.getElementById("searchInput").value.trim();
        currentSearchKeyword = keyword;
        if(keyword !== "") {
            currentCategory = "all";
            document.querySelectorAll(".cat-btn").forEach(btn => {
                if(btn.dataset.cat === "all") btn.classList.add("active");
                else btn.classList.remove("active");
            });
        } else {
            if(currentCategory === "all") {
                document.querySelectorAll(".cat-btn").forEach(btn => {
                    if(btn.dataset.cat === "all") btn.classList.add("active");
                    else btn.classList.remove("active");
                });
            }
        }
        renderProductGrid();
    }

    function switchCategory(category) {
        currentSearchKeyword = "";
        document.getElementById("searchInput").value = "";
        currentCategory = category;
        document.querySelectorAll(".cat-btn").forEach(btn => {
            if(btn.dataset.cat === category) btn.classList.add("active");
            else btn.classList.remove("active");
        });
        renderProductGrid();
    }

    function closeAllPanels() {
        document.getElementById("paymentPanel")?.classList.remove("show");
        document.getElementById("wechatPanel")?.classList.remove("show");
    }
    function showPaymentPanel() {
        const panel = document.getElementById("paymentPanel");
        if(panel.classList.contains("show")) closeAllPanels();
        else { closeAllPanels(); panel.classList.add("show"); }
    }
    function showWechatPanel() {
        const panel = document.getElementById("wechatPanel");
        if(panel.classList.contains("show")) closeAllPanels();
        else { closeAllPanels(); panel.classList.add("show"); }
    }

    function initEventListeners() {
        document.querySelectorAll(".cat-btn").forEach(btn => {
            btn.addEventListener("click", () => switchCategory(btn.dataset.cat));
        });
        document.getElementById("searchBtn").onclick = performSearch;
        const searchInput = document.getElementById("searchInput");
        if(searchInput) searchInput.onkeypress = (e) => { if(e.key === "Enter") performSearch(); };
        
        const searchInfo = document.getElementById("searchInfo");
        if(searchInfo) {
            searchInfo.onclick = () => {
                if(currentSearchKeyword) {
                    currentSearchKeyword = "";
                    document.getElementById("searchInput").value = "";
                    if(currentCategory !== "all") switchCategory("all");
                    else renderProductGrid();
                } else if(currentCategory !== "all") switchCategory("all");
                else renderProductGrid();
            };
        }
        
        document.getElementById("paymentCodeBtn").onclick = showPaymentPanel;
        document.getElementById("wechatFriendBtn").onclick = showWechatPanel;
        document.getElementById("closePaymentBtn").onclick = closeAllPanels;
        document.getElementById("closeWechatBtn").onclick = closeAllPanels;
        
        const modal = document.getElementById("detailModal");
        const closeDetail = document.getElementById("closeDetailBtn");
        if(closeDetail) closeDetail.onclick = () => modal.classList.remove("show");
        if(modal) modal.onclick = (e) => { if(e.target === modal) modal.classList.remove("show"); };
        
        window.addEventListener("click", (e) => {
            if(!e.target.closest(".side-panel") && !e.target.closest(".float-btn") && !e.target.closest(".detail-buy-btn")) {
                closeAllPanels();
            }
        });
    }

    document.addEventListener("DOMContentLoaded", () => {
        document.querySelector(".cat-btn[data-cat='all']").classList.add("active");
        renderProductGrid();
        initEventListeners();
    });
</script>
</body>
</html>
